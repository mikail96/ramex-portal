  const [showHidden, setShowHidden] = useState(false);
  const [users, setUsers] = useState(DEFAULT_USERS);
  const [editingUser, setEditingUser] = useState(null);
  const [editUser, setEditUser] = useState("");
  const [editPass, setEditPass] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [showCustom, setShowCustom] = useState(false);
  const catScrollRef = useRef(null);

  // Merged products list (base - hidden + custom)
  const products = useMemo(() => [
    ...BASE_PRODUCTS.filter(p => !hiddenProducts.includes(p.name)),
    ...customProducts
  ], [customProducts, hiddenProducts]);

  // All categories (base + any new from custom)
  const allCategories = useMemo(() => {
    const base = CAT_NAMES.map(c => c);
    const customCats = customProducts
      .filter(p => !base.find(b => b.name === p.category))
      .map(p => ({ emoji: "📌", name: p.category }));
    const seen = new Set();
    return [...base, ...customCats].filter(c => { if (seen.has(c.name)) return false; seen.add(c.name); return true; });
  }, [customProducts]);

  // Firebase realtime listeners
  useEffect(function() {
    var db = firebase.database();
    db.ref("orders").on("value", function(snap) {
      var val = snap.val();
      setOrders(val ? Object.values(val) : []);
    });
    db.ref("customProducts").on("value", function(snap) {
      setCustomProducts(snap.val() || []);
    });
    db.ref("hiddenProducts").on("value", function(snap) {
      setHiddenProducts(snap.val() || []);
    });
    db.ref("users").on("value", function(snap) {
      if (snap.val()) setUsers(snap.val());
    });
    return function() { db.ref().off(); };
  }, []);

  // Save orders
  var saveOrders = function(newOrders) {
    setOrders(newOrders);
    var obj = {};
    newOrders.forEach(function(o) { obj[o.id] = o; });
    firebase.database().ref("orders").set(obj);
  };

  // Save custom products
  var saveCustomProducts = function(newList) {
    setCustomProducts(newList);
    firebase.database().ref("customProducts").set(newList);
  };

  // Save hidden products
  var saveHiddenProducts = function(newList) {
    setHiddenProducts(newList);
    firebase.database().ref("hiddenProducts").set(newList);
  };

  // Save users
  var saveUsers = function(newUsers) {
    setUsers(newUsers);
    firebase.database().ref("users").set(newUsers);
  };

  const updateUserCreds = (id, newU, newP) => {
    if (!newU.trim() || !newP.trim()) { notify("Boş bırakılamaz", "error"); return; }
    saveUsers({ ...users, [id]: { user: newU.trim(), pass: newP.trim() } });

      setNewProd({ name: "", unit: "adet", category: newProd.category });

    const catInfo = allCategories.find(c => c.name === newProd.category);

              <div style={{ textAlign: "center", padding: "60px 0", color: textSub }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
                <p>Bekleyen talep yok</p>
              </div>
            ) : (
              pending.map(order => (
                <DepoOrderCard key={order.id} order={order} onApprove={approveOrder} />
              ))
            )
          )}

          {depoTab === "approved" && (
            approved.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: textSub }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
                <p>Henüz onaylanan talep yok</p>
              </div>
            ) : (
              approved.map(order => (
                <OrderCard key={order.id} order={order} isDepo={true} />
              ))
            )
          )}

          {depoTab === "products" && (
            <div style={{ animation: "fadeUp .3s ease" }}>
              {/* Add Product Form */}
              <div style={{
                padding: "16px", background: cardBg, borderRadius: 14,
                border: `1px solid ${border}`, marginBottom: 16,
              }}>
                <h4 style={{ color: gold, fontSize: 14, fontWeight: 700, marginBottom: 14, fontFamily: font }}>
                  ➕ Yeni Ürün Ekle
                </h4>
                <input placeholder="Ürün adı" value={newProd.name}
                  onChange={e => setNewProd(p => ({ ...p, name: e.target.value }))}
                  style={{
                    width: "100%", padding: "12px 14px", borderRadius: 10,
                    border: `1px solid ${border}`, background: darkBg,
                    color: textMain, fontSize: 14, fontFamily: font,
                    marginBottom: 10,
                  }} />
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 11, color: textSub, fontFamily: font, marginBottom: 4, display: "block" }}>Birim</label>
                    <select value={newProd.unit}
                      onChange={e => setNewProd(p => ({ ...p, unit: e.target.value }))}
                      style={{
                        width: "100%", padding: "10px 12px", borderRadius: 10,
                        border: `1px solid ${border}`, background: darkBg,
                        color: textMain, fontSize: 13, fontFamily: font,
                      }}>
                      {UNIT_OPTIONS.map(u => <option key={u} value={u}>{u}</option>)}
                    </select>
                  </div>
                  <div style={{ flex: 2 }}>
                    <label style={{ fontSize: 11, color: textSub, fontFamily: font, marginBottom: 4, display: "block" }}>Kategori</label>
                    <select value={newProd.category}
                      onChange={e => setNewProd(p => ({ ...p, category: e.target.value }))}
                      style={{
                        width: "100%", padding: "10px 12px", borderRadius: 10,
                        border: `1px solid ${border}`, background: darkBg,
                        color: textMain, fontSize: 13, fontFamily: font,
                      }}>
                      {allCategories.map(c => <option key={c.name} value={c.name}>{c.emoji} {c.name}</option>)}
                    </select>
                  </div>
                </div>
                <button onClick={addProduct}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 12,
                    background: `linear-gradient(135deg, ${gold}, #c4912e)`,
                    border: "none", color: "#000", fontSize: 14, fontWeight: 700,
                    cursor: "pointer", fontFamily: font,
                  }}>
                  ➕ ÜRÜN EKLE
                </button>
              </div>

              {/* Product Search */}
              <div style={{ position: "relative", marginBottom: 12 }}>
                <span style={{ position: "absolute", left: 14, top: 11, fontSize: 14, color: textSub }}>🔍</span>
                <input placeholder="Ürün ara..." value={prodSearch}
                  onChange={e => setProdSearch(e.target.value)}
                  style={{
                    width: "100%", padding: "11px 12px 11px 38px", borderRadius: 10,
                    border: `1px solid ${border}`, background: cardBg,
                    color: textMain, fontSize: 13, fontFamily: font,
                  }} />
              </div>

              {/* Stats */}
              <div style={{
                display: "flex", gap: 8, marginBottom: 14,
              }}>
                <div style={{ flex: 1, padding: "10px", background: cardBg, borderRadius: 10, border: `1px solid ${border}`, textAlign: "center" }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: green, fontFamily: font }}>{products.length}</div>
                  <div style={{ fontSize: 10, color: textSub, fontFamily: font }}>Aktif</div>
                </div>
                <div style={{ flex: 1, padding: "10px", background: cardBg, borderRadius: 10, border: `1px solid ${border}`, textAlign: "center", cursor: customProducts.length > 0 ? "pointer" : "default" }}
                  onClick={() => customProducts.length > 0 && setShowCustom(!showCustom)}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: gold, fontFamily: font }}>{customProducts.length}</div>
                  <div style={{ fontSize: 10, color: textSub, fontFamily: font }}>Eklenen</div>
                </div>
                <div style={{ flex: 1, padding: "10px", background: cardBg, borderRadius: 10, border: `1px solid ${border}`, textAlign: "center", cursor: hiddenProducts.length > 0 ? "pointer" : "default" }}
                  onClick={() => hiddenProducts.length > 0 && setShowHidden(!showHidden)}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: hiddenProducts.length > 0 ? red : textSub, fontFamily: font }}>{hiddenProducts.length}</div>
                  <div style={{ fontSize: 10, color: textSub, fontFamily: font }}>Kaldırılan</div>
                </div>
              </div>

              {/* Custom Products Panel */}
              {showCustom && customProducts.length > 0 && (
                <div style={{
                  padding: "14px", background: green + "08", borderRadius: 12,
                  border: `1px solid ${green}25`, marginBottom: 14,
                }}>
                  <h4 style={{ color: green, fontSize: 12, fontWeight: 700, marginBottom: 10, fontFamily: font, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span>★ Eklenen Ürünler</span>
                    <button onClick={() => setShowCustom(false)} style={{ background: "none", border: "none", color: textSub, cursor: "pointer", fontSize: 16 }}>✕</button>
                  </h4>
                  {customProducts.map((p, i) => (
                    <div key={p.name} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "10px 12px", background: cardBg, borderRadius: 8,
                      marginBottom: 4, border: `1px solid ${border}`,
                    }}>
                      <div>
                        <div style={{ fontSize: 12, color: textMain, fontFamily: font, fontWeight: 500 }}>{p.name}</div>
                        <div style={{ fontSize: 10, color: textSub, fontFamily: font }}>{p.emoji} {p.category} — {p.unit}</div>
                      </div>
                      <button onClick={() => setConfirmDelete(p.name)}
                        style={{
                          background: red + "15", border: `1px solid ${red}30`,
                          borderRadius: 8, padding: "6px 10px", cursor: "pointer",
                          color: red, fontSize: 12, fontFamily: font,
                        }}>🗑</button>
                    </div>
                  ))}
                </div>
              )}

              {/* Hidden Products (restore) */}
              {showHidden && hiddenProducts.length > 0 && (
                <div style={{
                  padding: "14px", background: red + "08", borderRadius: 12,
                  border: `1px solid ${red}25`, marginBottom: 14,
                }}>
                  <h4 style={{ color: red, fontSize: 12, fontWeight: 700, marginBottom: 10, fontFamily: font, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span>🗑 Kaldırılan Ürünler</span>
                    <button onClick={() => setShowHidden(false)} style={{ background: "none", border: "none", color: textSub, cursor: "pointer", fontSize: 16 }}>✕</button>
                  </h4>
                  {hiddenProducts.map(name => {
                    const base = BASE_PRODUCTS.find(p => p.name === name);
                    return (
                      <div key={name} style={{
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                        padding: "10px 12px", background: cardBg, borderRadius: 8,
                        marginBottom: 4, border: `1px solid ${border}`,
                      }}>
                        <div>
                          <div style={{ fontSize: 12, color: textSub, fontFamily: font, textDecoration: "line-through" }}>{name}</div>
                          <div style={{ fontSize: 10, color: textSub, fontFamily: font }}>{base && base.emoji} {base && base.category} — {base && base.unit}</div>
                        </div>
                        <button onClick={() => restoreProduct(name)}
                          style={{
                            background: green + "15", border: `1px solid ${green}30`,
                            borderRadius: 8, padding: "6px 10px", cursor: "pointer",
                            color: green, fontSize: 11, fontWeight: 600, fontFamily: font,
                          }}>↩ Geri Al</button>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* All Active Products */}
              <div>
                {confirmDelete && (
                  <div style={{
                    padding: "12px 14px", background: red + "15", borderRadius: 10,
                    border: `1px solid ${red}40`, marginBottom: 10,
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                  }}>
                    <div style={{ fontSize: 12, color: textMain, fontFamily: font, flex: 1 }}>
                      <strong>{confirmDelete}</strong> kaldırılsın mı?
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => removeProduct(confirmDelete)}
                        style={{ padding: "6px 14px", borderRadius: 8, background: red, border: "none", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: font }}>Evet</button>
                      <button onClick={() => setConfirmDelete(null)}
                        style={{ padding: "6px 14px", borderRadius: 8, background: "transparent", border: `1px solid ${border}`, color: textSub, fontSize: 12, cursor: "pointer", fontFamily: font }}>İptal</button>
                    </div>
                  </div>
                )}
                {(() => {
                  const s = prodSearch.toLocaleLowerCase("tr");
                  const list = s ? products.filter(p => p.name.toLocaleLowerCase("tr").includes(s)) : products;
                  if (list.length === 0) return <p style={{ textAlign: "center", color: textSub, padding: 30, fontFamily: font }}>Ürün bulunamadı</p>;
                  const grouped = {};
                  list.forEach(p => {
                    if (!grouped[p.category]) grouped[p.category] = [];
                    grouped[p.category].push(p);
                  });
                  return Object.entries(grouped).map(([cat, items]) => (
                    <div key={cat} style={{ marginBottom: 12 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: gold, marginBottom: 6, fontFamily: font, display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{items[0].emoji}</span> {cat}
                        <span style={{ color: textSub, fontWeight: 400 }}>({items.length})</span>
                      </div>
                      {items.map(p => {
                        const isCustom = !BASE_PRODUCTS.find(bp => bp.name === p.name);
                        return (
                          <div key={p.name} style={{
                            display: "flex", alignItems: "center", justifyContent: "space-between",
                            padding: "9px 12px", background: confirmDelete === p.name ? red + "10" : cardBg, borderRadius: 8,
                            border: `1px solid ${isCustom ? green + "25" : border}`, marginBottom: 3,
                          }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 12, fontWeight: 500, color: textMain, fontFamily: font, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                {isCustom && <span style={{ color: green, marginRight: 4, fontSize: 10 }}>★</span>}
                                {p.name}
                              </div>
                              <div style={{ fontSize: 10, color: textSub, fontFamily: font }}>{p.unit}</div>
                            </div>
                            <button onClick={() => setConfirmDelete(p.name)}
                              style={{ background: red + "10", border: `1px solid ${red}20`, borderRadius: 6, padding: "4px 8px", cursor: "pointer", color: red, fontSize: 12, fontFamily: font, flexShrink: 0 }}>✕</button>
                          </div>
                        );
                      })}
                    </div>
                  ));
                })()}
              </div>
            </div>
          )}

          {depoTab === "settings" && (
            <div style={{ animation: "fadeUp .3s ease" }}>
              <button onClick={exportToCSV}
                style={{
                  width: "100%", padding: "16px", borderRadius: 14,
                  background: `linear-gradient(135deg, ${green}, #059669)`,
                  border: "none", color: "#000", fontSize: 15, fontWeight: 700,
                  cursor: "pointer", fontFamily: font, marginBottom: 12,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}>
                📥 Excel'e Aktar (CSV)
              </button>

              <button onClick={resetData}
                style={{
                  width: "100%", padding: "16px", borderRadius: 14,
                  background: "transparent", border: `2px solid ${red}`,
                  color: red, fontSize: 15, fontWeight: 700,
                  cursor: "pointer", fontFamily: font, marginBottom: 20,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}>
                🗑 Tüm Verileri Sıfırla
              </button>

              <div style={{ padding: "16px", background: cardBg, borderRadius: 14, border: `1px solid ${border}`, marginBottom: 12 }}>
                <h4 style={{ color: gold, fontSize: 14, fontWeight: 700, marginBottom: 14, fontFamily: font }}>🔐 Giriş Bilgileri</h4>
                {[...STORES, { id: "depo", name: "DEPO", icon: "📦", color: gold }].map(s => {
                  const isEd = editingUser === s.id;
                  return (
                    <div key={s.id} style={{ padding: "12px", background: isEd ? `${gold}08` : darkBg, borderRadius: 10, border: `1px solid ${isEd ? gold + "30" : border}`, marginBottom: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: isEd ? 10 : 0 }}>
                        <div>
                          <span style={{ color: s.color, fontWeight: 700, fontSize: 13, fontFamily: font }}>{s.icon} {s.name}</span>
                          {!isEd && <div style={{ fontSize: 12, color: textSub, marginTop: 2, fontFamily: font }}>{users[s.id].user} / {users[s.id].pass}</div>}
                        </div>
                        {!isEd && (
                          <button onClick={() => { setEditingUser(s.id); setEditUser(users[s.id].user); setEditPass(users[s.id].pass); }}
                            style={{ background: `${gold}15`, border: `1px solid ${gold}30`, borderRadius: 8, padding: "5px 10px", cursor: "pointer", color: gold, fontSize: 11, fontWeight: 600, fontFamily: font }}>
                            ✏️ Düzenle
                          </button>
                        )}
                      </div>
                      {isEd && (
                        <div>
                          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                            <input placeholder="Kullanıcı adı" value={editUser} onChange={e => setEditUser(e.target.value)}
                              style={{ flex: 1, padding: "9px 10px", borderRadius: 8, border: `1px solid ${border}`, background: cardBg, color: textMain, fontSize: 13, fontFamily: font }} />
                            <input placeholder="Şifre" value={editPass} onChange={e => setEditPass(e.target.value)}
                              style={{ flex: 1, padding: "9px 10px", borderRadius: 8, border: `1px solid ${border}`, background: cardBg, color: textMain, fontSize: 13, fontFamily: font }} />
                          </div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={() => updateUserCreds(s.id, editUser, editPass)}
                              style={{ flex: 1, padding: "8px", borderRadius: 8, background: green, border: "none", color: "#000", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: font }}>✅ Kaydet</button>
                            <button onClick={() => setEditingUser(null)}
                              style={{ flex: 1, padding: "8px", borderRadius: 8, background: "transparent", border: `1px solid ${border}`, color: textSub, fontSize: 12, cursor: "pointer", fontFamily: font }}>İptal</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div style={{
                padding: "16px", background: cardBg2, borderRadius: 14,
                border: `1px solid ${border}`,
                fontSize: 12, color: textSub, lineHeight: 1.6,
              }}>
                <strong style={{ color: orange }}>⏰ Otomatik Sıfırlama:</strong><br />
                Her ayın 5'inde veriler otomatik silinir. Silmeden önce Excel'e aktarın.
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

// ─── COMPONENTS ───

function ProductCard({ p, idx, cart, add, remove }) {
  const qty = cart[idx] || 0;
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "12px 14px", background: qty > 0 ? "#1e2a1e" : cardBg,
      borderRadius: 12, marginBottom: 6,
      border: `1px solid ${qty > 0 ? green + "40" : border}`,
      transition: "all .2s",
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 13, fontWeight: 600, color: textMain,
          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
        }}>{p.name}</div>
        <div style={{ fontSize: 11, color: textSub, marginTop: 2 }}>{p.unit}</div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
        {qty > 0 && (
          <>
            <QtyButton onClick={() => remove(idx)} label="−" />
            <span style={{
              fontSize: 15, fontWeight: 700, width: 26, textAlign: "center",
              color: green,
            }}>{qty}</span>
          </>
        )}
        <QtyButton onClick={() => add(idx)} label="+" color={green} />
      </div>
    </div>
  );
}

function QtyButton({ onClick, label, color }) {
  return (
    <button onClick={onClick}
      style={{
        width: 34, height: 34, borderRadius: 10,
        border: `1px solid ${color || border}`,
        background: color ? color + "15" : "transparent",
        color: color || textSub, fontSize: 18, fontWeight: 700,
        cursor: "pointer", display: "flex", alignItems: "center",
        justifyContent: "center", fontFamily: font,
        transition: "all .15s",
      }}>
      {label}
    </button>
  );
}

function OrderCard({ order, isDepo }) {
  const [expanded, setExpanded] = useState(false);
  const date = new Date(order.date).toLocaleDateString("tr-TR", {
    day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit",
  });
  const storeInfo = STORES.find(s => s.id === order.store);

  return (
    <div style={{
      background: cardBg, borderRadius: 14, border: `1px solid ${border}`,
      marginBottom: 10, overflow: "hidden",
    }}>
      <button onClick={() => setExpanded(!expanded)}
        style={{
          width: "100%", padding: "14px 16px", background: "none",
          border: "none", cursor: "pointer", display: "flex",
          alignItems: "center", justifyContent: "space-between",
          textAlign: "left",
        }}>
        <div>
          {isDepo && (
            <div style={{ fontSize: 13, fontWeight: 700, color: (storeInfo && storeInfo.color) || gold, marginBottom: 4, fontFamily: font }}>
              {(storeInfo && storeInfo.icon)} {order.storeName}
            </div>
          )}
          <div style={{ fontSize: 12, color: textSub, fontFamily: font }}>{date}</div>
          <div style={{ fontSize: 12, color: textSub, fontFamily: font, marginTop: 2 }}>
            {order.items.length} ürün
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{
            padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600,
            background: order.status === "approved" ? green + "20" : orange + "20",
            color: order.status === "approved" ? green : orange,
            fontFamily: font,
          }}>
            {order.status === "approved" ? "✅ Onaylandı" : "⏳ Bekliyor"}
          </span>
          <span style={{ color: textSub, fontSize: 14, transform: expanded ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▼</span>
        </div>
      </button>
      {expanded && (
        <div style={{ padding: "0 16px 14px", borderTop: `1px solid ${border}` }}>
          {order.items.map((item, i) => (
            <div key={i} style={{
              display: "flex", justifyContent: "space-between",
              padding: "8px 0", borderBottom: i < order.items.length - 1 ? `1px solid ${border}` : "none",
              fontSize: 13,
            }}>
              <span style={{ color: textMain }}>{item.name}</span>
              <span style={{ color: green, fontWeight: 600 }}>{item.qty} {item.unit}</span>
            </div>
          ))}
          {order.removedItems && order.removedItems.length > 0 && (
            <>
              <div style={{ fontSize: 11, color: red, fontWeight: 600, marginTop: 10, marginBottom: 6 }}>
                ❌ Stokta Olmayan Ürünler:
              </div>
              {order.removedItems.map((item, i) => (
                <div key={i} style={{
                  display: "flex", justifyContent: "space-between",
                  padding: "6px 0", fontSize: 13, opacity: 0.5,
                  textDecoration: "line-through",
                }}>
                  <span style={{ color: red }}>{item.name}</span>
                  <span style={{ color: textSub }}>{item.qty} {item.unit}</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

function DepoOrderCard({ order, onApprove }) {
  const [expanded, setExpanded] = useState(false);
  const [removedItems, setRemovedItems] = useState([]);
  const storeInfo = STORES.find(s => s.id === order.store);
  const date = new Date(order.date).toLocaleDateString("tr-TR", {
    day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit",
  });

  const toggleRemove = (name) => {
    setRemovedItems(prev =>
      prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]
    );
  };

  return (
    <div style={{
      background: cardBg, borderRadius: 14,
      border: `2px solid ${orange}30`, marginBottom: 12,
      overflow: "hidden",
    }}>
      <button onClick={() => setExpanded(!expanded)}
        style={{
          width: "100%", padding: "16px", background: "none",
          border: "none", cursor: "pointer", display: "flex",
          alignItems: "center", justifyContent: "space-between",
          textAlign: "left",
        }}>
        <div>
          <div style={{ fontSize: 15, fontWeight: 700, color: (storeInfo && storeInfo.color) || gold, fontFamily: font }}>
            {(storeInfo && storeInfo.icon)} {order.storeName}
          </div>
          <div style={{ fontSize: 12, color: textSub, fontFamily: font, marginTop: 4 }}>
            {date} — {order.items.length} ürün
          </div>
        </div>
        <span style={{
          color: textSub, fontSize: 16,
          transform: expanded ? "rotate(180deg)" : "none",
          transition: "transform .2s",
        }}>▼</span>
      </button>

      {expanded && (
        <div style={{ padding: "0 16px 16px", borderTop: `1px solid ${border}` }}>
          <p style={{ fontSize: 11, color: textSub, margin: "10px 0 8px", fontFamily: font }}>
            Stokta olmayan ürünlere tıklayarak çıkarın, sonra onaylayın:
          </p>
          {order.items.map((item, i) => {
            const isRemoved = removedItems.includes(item.name);
            return (
              <button key={i} onClick={() => toggleRemove(item.name)}
                style={{
                  width: "100%", display: "flex", justifyContent: "space-between",
                  alignItems: "center", padding: "10px 12px",
                  background: isRemoved ? red + "15" : "transparent",
                  borderRadius: 8, border: `1px solid ${isRemoved ? red + "40" : "transparent"}`,
                  marginBottom: 4, cursor: "pointer",
                  opacity: isRemoved ? 0.5 : 1,
                  textDecoration: isRemoved ? "line-through" : "none",
                  textAlign: "left", transition: "all .15s",
                }}>
                <span style={{ fontSize: 13, color: isRemoved ? red : textMain, fontFamily: font }}>
                  {isRemoved ? "❌ " : ""}{item.name}
                </span>
                <span style={{ fontSize: 13, color: isRemoved ? textSub : green, fontWeight: 600, fontFamily: font }}>
                  {item.qty} {item.unit}
                </span>
              </button>
            );
          })}

          <button onClick={() => onApprove(order.id, removedItems)}
            style={{
              width: "100%", padding: "14px", borderRadius: 12,
              background: `linear-gradient(135deg, ${green}, #059669)`,
              border: "none", color: "#000", fontSize: 15, fontWeight: 700,
              cursor: "pointer", fontFamily: font, marginTop: 12,
            }}>
            ✅ TALEBİ ONAYLA {removedItems.length > 0 ? `(${order.items.length - removedItems.length}/${order.items.length} ürün)` : ""}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
