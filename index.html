// Request push notification permission and save token
function requestPushPermission(userId) {
  if (!('Notification' in window) || !swRegistration) return;
  Notification.requestPermission().then(function(permission) {
    if (permission === 'granted') {
      firebase.messaging().getToken({ 
        vapidKey: VAPID_KEY,
        serviceWorkerRegistration: swRegistration 
      }).then(function(token) {
        if (token) {
          firebase.database().ref("fcmTokens/" + userId).set(token);
          console.log("FCM token saved for", userId);
        }
      }).catch(function(err){ console.error("FCM token error:", err); });
    }
  }).catch(function(){});
  
  // Foreground message handler
  firebase.messaging().onMessage(function(payload) {
    var n = payload.notification || {};
    if (document.getElementById("fcm-toast")) return;
    var div = document.createElement("div");
    div.id = "fcm-toast";
    div.style.cssText = "position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#d4a844;color:#000;padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:99999;font-family:Outfit,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideDown .3s ease";
    div.textContent = "🔔 " + (n.title || "") + " " + (n.body || "");
    document.body.appendChild(div);
    setTimeout(function() { div.remove(); }, 4000);
  });
}
